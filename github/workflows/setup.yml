name: Auto Setup Astro PSEO

on:
  workflow_dispatch: # Isse tum "Run Workflow" button se trigger kar sakte ho

jobs:
  setup-project:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Folder Structure
        run: |
          mkdir -p src/pages/loot

      - name: Create package.json
        run: |
          cat <<EOF > package.json
          {
            "name": "capitalmetric-pseo",
            "type": "module",
            "version": "0.0.1",
            "scripts": {
              "dev": "astro dev",
              "start": "astro dev",
              "build": "astro build",
              "preview": "astro preview"
            },
            "dependencies": {
              "astro": "^4.0.0"
            }
          }
          EOF

      - name: Create astro.config.mjs
        run: |
          cat <<EOF > astro.config.mjs
          import { defineConfig } from 'astro/config';
          export default defineConfig({
            output: 'static',
            site: 'https://capitalmetric.vercel.app',
          });
          EOF

      - name: Create Index Page
        run: |
          cat <<EOF > src/pages/index.astro
          ---
          const title = "Best UPI Loot 2026 | Skill2Income Hub";
          ---
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>{title}</title>
              <style>
                  body { font-family: sans-serif; background: #0f0c29; color: white; text-align: center; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
                  .container { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); max-width: 400px; }
                  h1 { color: #ffd700; font-size: 2rem; }
                  .btn { background: linear-gradient(45deg, #ffd700, #ffae00); color: black; padding: 15px 30px; font-weight: bold; text-decoration: none; border-radius: 50px; display: inline-block; margin-top: 20px; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>🚀 Secret UPI Loot</h1>
                  <p>Join 1,200+ students earning ₹500 daily!</p>
                  <a href="https://t.me/ShivaCyberBot" class="btn">UNLOCK NOW 🔓</a>
              </div>
          </body>
          </html>
          EOF

      - name: Create PSEO Pages
        run: |
          cat <<EOF > src/pages/loot/[city].astro
          ---
          export async function getStaticPaths() {
              const cities = ["delhi", "mumbai", "bangalore", "hyderabad", "ahmedabad", "chennai", "kolkata", "surat", "pune", "jaipur", "lucknow", "kanpur", "nagpur", "indore", "thane", "bhopal", "visakhapatnam", "pimpri-chinchwad", "patna", "vadodara"];
              return cities.map(city => ({ params: { city: city }, props: { cityName: city.charAt(0).toUpperCase() + city.slice(1) } }));
          }
          const { cityName } = Astro.props;
          const title = \`Best UPI Loot in \${cityName} 2026 | Earn ₹500 Daily\`;
          ---
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>{title}</title>
              <meta name="description" content={\`Looking for the best UPI loot in \${cityName}? Join Skill2Income Hub and earn ₹200-₹500 daily for free.\`}>
              <style>
                  body { font-family: sans-serif; background: #0f0c29; color: white; text-align: center; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
                  .container { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); max-width: 400px; }
                  h1 { color: #ffd700; font-size: 1.8rem; }
                  .btn { background: linear-gradient(45deg, #ffd700, #ffae00); color: black; padding: 15px 30px; font-weight: bold; text-decoration: none; border-radius: 50px; display: inline-block; margin-top: 20px; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>🚀 Best UPI Loot in {cityName}</h1>
                  <p>Congratulations! You found the secret earning glitch for {cityName} students. Earn ₹200-₹500 daily.</p>
                  <a href="https://t.me/ShivaCyberBot" class="btn">CLAIM {cityName} LOOT 🔓</a>
              </div>
          </body>
          </html>
          EOF

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-setup Astro PSEO structure"
          git push
